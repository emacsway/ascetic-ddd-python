networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: devel
      POSTGRES_PASSWORD: devel
      POSTGRES_DB: devel_karmabot_test
    ports:
      - "5432:5432"

  vault:
    image: hashicorp/vault:latest
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: test-root-token
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: test-root-token
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    entrypoint: >
      sh -c "
        vault server -dev -dev-root-token-id=test-root-token -dev-listen-address=0.0.0.0:8200 &
        sleep 2 &&
        vault secrets enable transit &&
        wait
      "
